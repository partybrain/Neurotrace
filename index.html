<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurotrace | Opera-Analytica</title>
    
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%233b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500&family=Space+Grotesk:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
            :root {
            --bg-base: #000000;
            --border-hard: #333333;
            --text-primary: #ffffff;
            --text-dim: #888888;
            --accent-error: #ef4444;
            --accent-success: #10b981;
            --accent-judge: #8b5cf6;
            --accent-reflect: #f59e0b;
            --accent-tool: #3b82f6;
            
    
            --font-ui: 'Fira Sans', sans-serif;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-ui); }
        body { background-color: var(--bg-base); color: var(--text-primary); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; min-width: 220px; max-width: 600px; display: flex; flex-direction: column; flex-shrink: 0; background-color: #050505;}
        .resizer { width: 4px; background-color: var(--border-hard); cursor: ew-resize; transition: background-color 0.2s; z-index: 10; flex-shrink: 0; }
        .resizer:hover, .resizer.is-resizing { background-color: var(--text-dim); }
        .main-visualizer { flex-grow: 1; display: flex; flex-direction: column; padding: 40px; border-right: 1px solid var(--border-hard); overflow: hidden; min-width: 0; }
        .metrics-panel { width: 250px; padding: 40px 20px; flex-shrink: 0; background-color: #050505; overflow-y: auto;}

        /* === SIDEBAR CONTENT === */
        .header { padding: 20px; font-family: var(--font-heading); font-size: 1.5rem; font-weight: 600; border-bottom: 1px solid var(--border-hard); letter-spacing: 0.5px; display: flex; align-items: center; gap: 10px; }
        .run-list { padding: 20px; overflow-y: auto; flex: 1; min-height: 100px; }
        .run-item { padding: 10px 0; margin-bottom: 10px; cursor: pointer; border-bottom: 1px solid var(--border-hard); }
        .run-item.active { border-left: 2px solid var(--text-primary); padding-left: 10px; }
        .run-title { font-size: 0.95rem; font-weight: 500; }
        .run-time { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

        /* === MAIN PANEL === */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 15px; }
        .title { font-family: var(--font-heading); font-size: 2rem; font-weight: 600;}
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn { background-color: var(--text-primary); color: var(--bg-base); border: 1px solid var(--text-primary); padding: 10px 20px; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: all 0.2s ease; white-space: nowrap; }
        .btn-outline { background-color: transparent; color: var(--text-dim); border: 1px solid var(--border-hard); }
        .btn:hover { background-color: var(--bg-base); color: var(--text-primary); }
        .btn-outline:hover { border-color: var(--text-primary); color: var(--text-primary); }

        .graph-container { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 20px; padding-right: 10px;}
        .graph-container::-webkit-scrollbar { width: 6px; }
        .graph-container::-webkit-scrollbar-thumb { background: var(--border-hard); border-radius: 3px; }

        /* === INPUT AREA === */
        .task-input-container { display: flex; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-hard); }
        .task-input { flex-grow: 1; background-color: var(--bg-base); border: 1px solid var(--border-hard); color: var(--text-primary); padding: 12px 16px; font-size: 1rem; outline: none; transition: border-color 0.2s; width: 100%; }
        .task-input:focus { border-color: var(--text-dim); }
        .task-input::placeholder { color: var(--text-dim); }

        /* === NODES === */
        .node { border: 1px solid var(--border-hard); padding: 20px; position: relative; background: #0a0a0a;}
        .node::before { content: '↓'; position: absolute; top: -22px; left: 20px; color: var(--border-hard); font-size: 1.2rem; font-family: sans-serif; }
        .node:first-child::before { display: none; }
        .node-tag { font-family: var(--font-heading); font-size: 0.8rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; display: block; letter-spacing: 1px; font-weight: 600;}
        .node-content { font-size: 1rem; line-height: 1.6; color: #d1d5db; word-break: break-word; }
        
        .code-block { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-dim); padding: 12px; margin-top: 10px; border: 1px solid var(--border-hard); background: #000; display: block; white-space: pre-wrap; word-wrap: break-word; }

        .node.error { border-color: var(--accent-error); }
        .node.error .node-tag { color: var(--accent-error); }
        .node.reflect { border-color: var(--accent-reflect); }
        .node.reflect .node-tag { color: var(--accent-reflect); }
        .node.success { border-color: var(--accent-success); }
        .node.success .node-tag { color: var(--accent-success); }
        .node.tool { border-color: var(--accent-tool); border-style: dashed; }
        .node.tool .node-tag { color: var(--accent-tool); }

        /* === METRICS PANEL === */
        .panel-title { font-family: var(--font-heading); font-size: 1.2rem; margin-bottom: 30px; border-bottom: 1px solid var(--border-hard); padding-bottom: 10px; }
        .metric-card { margin-bottom: 30px; }
        .metric-label { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .metric-value { font-size: 2rem; font-weight: 400; word-break: break-word; }
        .error-text { color: var(--accent-error); }

        /* === CONFIG INPUTS === */
        .config-input { width: 100%; background-color: var(--bg-base); border: 1px solid var(--border-hard); color: var(--text-primary); padding: 8px; font-size: 0.9rem; outline: none; margin-bottom: 10px; transition: border-color 0.2s; }
        .config-input:focus { border-color: var(--text-dim); }

        /* === RESPONSIVE DESIGN === */
        @media (max-width: 1024px) {
            body { 
                flex-direction: column; 
                height: 100dvh; 
                overflow-y: auto; 
            }
            .sidebar { 
                width: 100% !important; 
                max-width: none; 
                border-right: none;
                border-bottom: 1px solid var(--border-hard);
            }
            .run-list {
                max-height: 200px; 
            }
            .resizer { 
                display: none; 
            }
            .main-visualizer { 
                padding: 20px; 
                border-right: none;
                border-bottom: 1px solid var(--border-hard);
                min-height: 500px; 
            }
            .metrics-panel { 
                width: 100%; 
                padding: 20px;
                display: flex;
                flex-wrap: wrap;
                align-items: flex-start;
                gap: 20px;
            }
            .panel-title {
                width: 100%;
                margin-bottom: 10px;
            }
            .metric-card {
                margin-bottom: 0;
                flex: 1;
                min-width: 120px;
            }
        }

        @media (max-width: 600px) {
            .top-bar { 
                flex-direction: column; 
                align-items: flex-start; 
            }
            .title { 
                font-size: 1.5rem; 
            }
            .task-input-container { 
                flex-direction: column; 
            }
            .btn { 
                width: 100%; 
            }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="header">
            <!-- New Isometric Stack Logo -->
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-tool);">
                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                <path d="M2 17l10 5 10-5"></path>
                <path d="M2 12l10 5 10-5"></path>
            </svg>
            Neurotrace
        </div>
        
        <div class="run-list" id="run-history">
            <div class="run-item active">
                <div class="run-title">Available Tools</div>
                <div class="run-time">1. Calculator<br>2. SystemTime</div>
            </div>
            <div class="run-item active" style="margin-top:20px;">
                <div class="run-title">Session Memory</div>
                <div class="run-time" id="memory-count">0 items in context</div>
            </div>
        </div>

        <div style="padding: 20px; border-top: 1px solid var(--border-hard); background-color: #08080a;">
            <div style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;">
                Live Inspector
            </div>
            <div id="inspector-content" style="font-size: 0.9rem; color: var(--text-dim);">
                Awaiting execution trace...
            </div>
        </div>
        
        <div style="padding: 20px; border-top: 1px solid var(--border-hard);">
            <div style="font-family: var(--font-heading); font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: 600;">Configuration</div>
            
            <select id="api-provider" class="config-input" onchange="updateDefaultModel(); saveConfig()">
                <option value="https://api.groq.com/openai/v1/chat/completions">Provider: Groq</option>
                <option value="https://api.openai.com/v1/chat/completions">Provider: OpenAI</option>
                <option value="https://openrouter.ai/api/v1/chat/completions">Provider: OpenRouter</option>
            </select>

            <input type="text" id="model-name" class="config-input" placeholder="Model Name" value="llama-3.1-8b-instant" onchange="saveConfig()">
            
            <input type="password" id="api-key-input" class="config-input" placeholder="API Key (sk-...)" onchange="saveConfig()" style="margin-bottom: 0;">
        </div>
    </div>

    <div class="resizer" id="resizer"></div>

    <div class="main-visualizer">
        <div class="top-bar">
            <div class="title">Execution Trace</div>
            <div class="btn-group">
                <button class="btn btn-outline" id="export-btn" style="display: none;">Export Trace</button>
                <button class="btn btn-outline" id="reset-key-btn">Clear Config</button>
            </div>
        </div>
        
        <div class="graph-container" id="stream-container">
            <div style="color: var(--text-dim); font-size: 1rem; text-align: center; margin-top: auto; margin-bottom: auto;">
                Awaiting task initialization...
            </div>
        </div>

        <div class="task-input-container">
            <input type="text" id="task-input" class="task-input" placeholder="Assign task (e.g., 'What is 234 * 456?')..." autocomplete="off" />
            <button class="btn" id="run-btn">Execute</button>
        </div>
    </div>

    <div class="metrics-panel">
        <div class="panel-title">Evaluation</div>
        <div class="metric-card">
            <div class="metric-label">Judge Score</div>
            <div class="metric-value" id="sim-score">--</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Total Latency</div>
            <div class="metric-value" id="latency">--</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Total Tokens</div>
            <div class="metric-value" id="tokens">0</div>
        </div>
    </div>

    <script>
        // --- RESIZABLE SIDEBAR (Mouse & Touch Enabled) ---
        const resizer = document.getElementById('resizer');
        const sidebar = document.getElementById('sidebar');
        let isResizing = false;

        const startResize = () => { 
            isResizing = true; 
            document.body.style.cursor = 'ew-resize'; 
            resizer.classList.add('is-resizing'); 
            document.body.style.userSelect = 'none'; 
        };
        const handleResize = (clientX) => {
            if (!isResizing) return;
            // Only allow resize if we are in desktop view (window width > 1024)
            if (window.innerWidth <= 1024) return; 
            let newWidth = clientX;
            if (newWidth < 220) newWidth = 220;
            if (newWidth > 600) newWidth = 600;
            sidebar.style.width = newWidth + 'px';
        };
        const stopResize = () => { 
            if (isResizing) { 
                isResizing = false; 
                document.body.style.cursor = 'default'; 
                resizer.classList.remove('is-resizing'); 
                document.body.style.userSelect = ''; 
            } 
        };

        // Mouse Events
        resizer.addEventListener('mousedown', startResize);
        document.addEventListener('mousemove', (e) => handleResize(e.clientX));
        document.addEventListener('mouseup', stopResize);
        
        // Touch Events
        resizer.addEventListener('touchstart', (e) => { startResize(); }, {passive: true});
        document.addEventListener('touchmove', (e) => { handleResize(e.touches[0].clientX); });
        document.addEventListener('touchend', stopResize);

        // --- CORE LOGIC & STATE ---
        const streamContainer = document.getElementById('stream-container');
        const inspectorContent = document.getElementById('inspector-content');
        const taskInput = document.getElementById('task-input');
        const exportBtn = document.getElementById('export-btn');
        
        let sessionMemory = []; 
        let currentTraceData = null; 

        // Load config
        window.onload = function() {
            const savedConfig = JSON.parse(localStorage.getItem('omnitraceConfig') || '{}');
            if (savedConfig.provider) document.getElementById('api-provider').value = savedConfig.provider;
            if (savedConfig.model) document.getElementById('model-name').value = savedConfig.model;
            if (savedConfig.key) document.getElementById('api-key-input').value = savedConfig.key;
        };

        function updateDefaultModel() {
            const provider = document.getElementById('api-provider').value;
            const modelInput = document.getElementById('model-name');
            if (provider.includes("openai.com")) modelInput.value = "gpt-4o-mini";
            if (provider.includes("groq.com")) modelInput.value = "llama-3.1-8b-instant";
            if (provider.includes("openrouter.ai")) modelInput.value = "meta-llama/llama-3.1-70b-instruct";
            saveConfig();
        }

        function saveConfig() {
            const config = {
                provider: document.getElementById('api-provider').value,
                model: document.getElementById('model-name').value.trim(),
                key: document.getElementById('api-key-input').value.trim()
            };
            localStorage.setItem('omnitraceConfig', JSON.stringify(config));
            return config;
        }

        // --- REAL TOOL EXECUTION REGISTRY ---
        const tools = {
            "calculator": (expression) => {
                try {
                    const sanitized = expression.replace(/[^0-9+\-*/(). ]/g, '');
                    return String(new Function(`return ${sanitized}`)());
                } catch (e) {
                    return "Error: Invalid math expression.";
                }
            },
            "get_time": () => {
                return new Date().toISOString();
            }
        };

        // UNIVERSAL API CALLER
        async function callLLMAPI(systemPrompt, userPrompt) {
            const config = saveConfig();
            if (!config.key) throw new Error("API Key is missing. Please enter it in the Configuration panel.");

            const response = await fetch(config.provider, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${config.key}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: config.model,
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: userPrompt }
                    ],
                    temperature: 0.2,
                    response_format: { type: "json_object" }
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(`API Error: ${data.error?.message || "Unknown error"}`);
            return data;
        }

        async function runRealAgent() {
            const userQuery = taskInput.value.trim();
            if (!userQuery) return; 

            const config = saveConfig();
            if (!config.key) { alert("Please enter your API Key in the bottom left Configuration box first."); return; }

            exportBtn.style.display = 'none';
            taskInput.value = '';
            currentTraceData = { task: userQuery, steps: [], totalTokens: 0, totalTime: 0, model: config.model };
            
            streamContainer.innerHTML = `
                <div class="node"><span class="node-tag">User Input</span><div class="node-content">"${userQuery}"</div></div>
                <div class="node" id="loading-node"><span class="node-tag" style="color: var(--text-dim);">Agent Pipeline [${config.model}]</span><div class="node-content" style="color: var(--text-dim);">Planning execution...</div></div>
            `;
            inspectorContent.innerHTML = '<div style="color: var(--text-dim); font-family: var(--font-mono);">Initializing ReAct loop...</div>';
            
            const startTime = Date.now();

            try {
                let memoryContext = "No past context.";
                if (sessionMemory.length > 0) {
                    const lastMemories = sessionMemory.slice(-2).map(m => `User: ${m.q} | Agent: ${m.a}`).join("\n");
                    memoryContext = `Past Session Context:\n${lastMemories}`;
                }

                // PHASE 1: REASON & SELECT TOOL
                const systemAgent = `You are a strict ReAct AI agent. Context: ${memoryContext}
                Available Tools: 
                1. "calculator": evaluates math (e.g. "2+2")
                2. "get_time": returns current UTC time (no input needed)
                3. "none": use if you can answer directly.
                
                Respond in STRICT JSON format with EXACTLY these keys:
                "thought": (string) your reasoning, 
                "tool_name": (string) the tool you want to call ("calculator", "get_time", or "none"), 
                "tool_input": (string) the input for the tool (or empty string).`;

                const agentData = await callLLMAPI(systemAgent, userQuery);
                const aiPlan = JSON.parse(agentData.choices[0].message.content);
                currentTraceData.totalTokens += agentData.usage.total_tokens || 0;
                
                document.getElementById('loading-node').remove();
                
                streamContainer.innerHTML += `
                    <div class="node"><span class="node-tag">Thought</span><div class="node-content">${aiPlan.thought}</div></div>
                `;

                let observation = "";
                let finalAnswer = "";

                // PHASE 2: REAL TOOL EXECUTION
                if (aiPlan.tool_name && aiPlan.tool_name !== "none") {
                    streamContainer.innerHTML += `
                        <div class="node tool">
                            <span class="node-tag">Action: Tool Call</span>
                            <div class="node-content">
                                Executing local tool...
                                <span class="code-block">Tool: ${aiPlan.tool_name}\nInput: ${aiPlan.tool_input}</span>
                            </div>
                        </div>
                    `;
                    streamContainer.scrollTop = streamContainer.scrollHeight;

                    // Actually run the tool
                    if (tools[aiPlan.tool_name]) {
                        observation = tools[aiPlan.tool_name](aiPlan.tool_input);
                    } else {
                        observation = "Error: Tool not found.";
                    }

                    streamContainer.innerHTML += `
                        <div class="node">
                            <span class="node-tag">Observation</span>
                            <div class="node-content"><span class="code-block">${observation}</span></div>
                        </div>
                        <div class="node" id="synthesis-node"><span class="node-tag" style="color: var(--text-dim);">Agent Synthesis</span><div class="node-content" style="color: var(--text-dim);">Synthesizing final answer...</div></div>
                    `;
                    streamContainer.scrollTop = streamContainer.scrollHeight;

                    // PHASE 3: SYNTHESIZE ANSWER
                    const synthesisPrompt = `You are an AI. The user asked: "${userQuery}". You used the tool "${aiPlan.tool_name}" and got the observation: "${observation}". Formulate a final answer. Respond in STRICT JSON: {"answer": "your final text"}`;
                    const synthData = await callLLMAPI(synthesisPrompt, "Provide final answer.");
                    const synthResponse = JSON.parse(synthData.choices[0].message.content);
                    currentTraceData.totalTokens += synthData.usage.total_tokens || 0;
                    finalAnswer = synthResponse.answer;
                    document.getElementById('synthesis-node').remove();

                } else {
                    // No tool needed, agent just answers
                    const directPrompt = `You are an AI. User asked: "${userQuery}". Answer directly. Respond in STRICT JSON: {"answer": "your final text"}`;
                    const directData = await callLLMAPI(directPrompt, "Provide final answer.");
                    finalAnswer = JSON.parse(directData.choices[0].message.content).answer;
                    currentTraceData.totalTokens += directData.usage.total_tokens || 0;
                }

                streamContainer.innerHTML += `<div class="node"><span class="node-tag">Initial Output</span><div class="node-content">${finalAnswer}</div></div>`;
                streamContainer.scrollTop = streamContainer.scrollHeight;

                // PHASE 4: LLM-AS-A-JUDGE
                streamContainer.innerHTML += `<div class="node" id="eval-node"><span class="node-tag" style="color: var(--text-dim);">Evaluation Harness</span><div class="node-content" style="color: var(--text-dim);">Judge LLM scoring the output...</div></div>`;
                streamContainer.scrollTop = streamContainer.scrollHeight;

                const systemJudge = `Evaluate this answer to this query: "${userQuery}".\nAnswer: "${finalAnswer}".\nScore it 0-100 on accuracy. Strict JSON: {"score": number, "critique": "string"}.`;
                const judgeData = await callLLMAPI(systemJudge, "Evaluate.");
                const judgeResponse = JSON.parse(judgeData.choices[0].message.content);
                currentTraceData.totalTokens += judgeData.usage.total_tokens || 0;
                
                document.getElementById('eval-node').remove();

                inspectorContent.innerHTML = `
                    <div style="margin-bottom: 15px;">
                        <div style="color: var(--accent-judge); font-family: var(--font-heading); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; margin-bottom: 5px;">LLM-As-Judge Scoring</div>
                        <div style="color: var(--text-primary); font-size: 1.1rem; margin-bottom: 5px;">Score: ${judgeResponse.score}/100</div>
                        <div style="color: var(--text-dim); line-height: 1.5;">Critique: ${judgeResponse.critique}</div>
                    </div>
                `;

                // PHASE 5: SELF-CORRECTION
                if (judgeResponse.score < 75) {
                    streamContainer.innerHTML += `<div class="node" id="reflect-node"><span class="node-tag" style="color: var(--text-dim);">Self-Correction</span><div class="node-content" style="color: var(--text-dim);">Score low. Reflecting...</div></div>`;
                    streamContainer.scrollTop = streamContainer.scrollHeight;

                    const systemReflect = `User asked: "${userQuery}". Your answer: "${finalAnswer}". Critique: "${judgeResponse.critique}". Fix it. Strict JSON: {"reason": "how you fixed it", "answer": "new text"}.`;
                    const reflectData = await callLLMAPI(systemReflect, "Correct it.");
                    const reflectResponse = JSON.parse(reflectData.choices[0].message.content);
                    currentTraceData.totalTokens += reflectData.usage.total_tokens || 0;
                    finalAnswer = reflectResponse.answer;

                    document.getElementById('reflect-node').remove();
                    streamContainer.innerHTML += `
                        <div class="node reflect"><span class="node-tag">Reflection Triggered</span><div class="node-content">${reflectResponse.reason}</div></div>
                        <div class="node success"><span class="node-tag">Corrected Final Output</span><div class="node-content">${finalAnswer}</div></div>
                    `;
                } else {
                    streamContainer.innerHTML += `<div class="node success"><span class="node-tag">Verified Output</span><div class="node-content">Passed quality threshold.</div></div>`;
                }

                // Finalize Metrics
                const totalTimeSec = ((Date.now() - startTime) / 1000).toFixed(2);
                document.getElementById('tokens').innerText = currentTraceData.totalTokens;
                document.getElementById('latency').innerText = totalTimeSec + "s";
                document.getElementById('sim-score').innerText = judgeResponse.score + "%";

                sessionMemory.push({ q: userQuery, a: finalAnswer });
                document.getElementById('memory-count').innerText = `${sessionMemory.length} items in context`;
                exportBtn.style.display = 'block';

                streamContainer.scrollTop = streamContainer.scrollHeight;

            } catch (error) {
                document.getElementById('loading-node')?.remove();
                document.getElementById('synthesis-node')?.remove();
                document.getElementById('eval-node')?.remove();
                document.getElementById('reflect-node')?.remove();
                simulateFailure(error.message);
            }
        }

        function simulateFailure(errorMsg) {
            let errorType = "UNKNOWN_ERROR";
            if (errorMsg.includes("JSON")) errorType = "JSON_PARSE_ERROR";
            else if (errorMsg.includes("fetch")) errorType = "NETWORK_TIMEOUT";
            else if (errorMsg.includes("API Error")) errorType = "API_LIMIT_OR_AUTH";
            else errorType = "HALLUCINATION_RISK";

            streamContainer.innerHTML += `
                <div class="node error">
                    <span class="node-tag">Guardrail Check: ${errorType}</span>
                    <div class="node-content">
                        Execution halted to prevent catastrophic failure.
                        <span class="code-block">${errorMsg}</span>
                        <br><span style="font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-dim);">[Graceful Fallback Initiated]</span>
                    </div>
                </div>
            `;
            
            inspectorContent.innerHTML = `
                <div style="color: var(--accent-error); font-family: var(--font-heading); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; margin-bottom: 5px;">Execution Failed</div>
                <div style="color: var(--text-primary); line-height: 1.5;">${errorType} triggered a halt.</div>
            `;
            
            document.getElementById('sim-score').innerText = "Fail";
            document.getElementById('sim-score').classList.add('error-text');
            exportBtn.style.display = 'block'; 
            streamContainer.scrollTop = streamContainer.scrollHeight;
        }

        exportBtn.onclick = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentTraceData, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "omnitrace_run.json");
            document.body.appendChild(downloadAnchorNode); 
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        taskInput.addEventListener('keypress', e => { if (e.key === 'Enter') runRealAgent(); });
        document.getElementById('run-btn').onclick = runRealAgent;
        
        document.getElementById('reset-key-btn').onclick = function() { 
            localStorage.removeItem('omnitraceConfig');
            document.getElementById('api-provider').value = "https://api.groq.com/openai/v1/chat/completions";
            document.getElementById('model-name').value = "llama-3.1-8b-instant";
            document.getElementById('api-key-input').value = "";
            alert("Configuration cleared from memory."); 
        };
    </script>
</body>
</html>
